<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="bee2beeTitle bee2beeDesc">
  <title id="bee2beeTitle">Bee2Bee system mark</title>
  <desc id="bee2beeDesc">A glowing robotic bee carrying a package, used as the Bee2Bee Restock Copilot icon.</desc>
  <defs>
    <linearGradient id="bodyGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE978"/>
      <stop offset="55%" stop-color="#FFC400"/>
      <stop offset="100%" stop-color="#FF9F0A"/>
    </linearGradient>
    <linearGradient id="wingGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D9E5F7"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

